<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Solar Panel -->
  <rect x="130" y="120" width="252" height="180" rx="12" fill="#4DD0E1" stroke="#1A2744" stroke-width="16" stroke-linejoin="round"/>
  <!-- Panel grid lines - vertical -->
  <line x1="214" y1="120" x2="214" y2="300" stroke="#1A2744" stroke-width="8"/>
  <line x1="298" y1="120" x2="298" y2="300" stroke="#1A2744" stroke-width="8"/>
  <!-- Panel grid lines - horizontal -->
  <line x1="130" y1="180" x2="382" y2="180" stroke="#1A2744" stroke-width="8"/>
  <line x1="130" y1="240" x2="382" y2="240" stroke="#1A2744" stroke-width="8"/>
  <!-- Panel stand -->
  <line x1="256" y1="300" x2="256" y2="370" stroke="#1A2744" stroke-width="14" stroke-linecap="round"/>
  <line x1="190" y1="370" x2="322" y2="370" stroke="#1A2744" stroke-width="14" stroke-linecap="round"/>
  <!-- Sun -->
  <circle cx="420" cy="90" r="36" fill="#FFD54F" stroke="#1A2744" stroke-width="12"/>
  <!-- Sun rays -->
  <line x1="420" y1="38" x2="420" y2="18" stroke="#FFD54F" stroke-width="10" stroke-linecap="round"/>
  <line x1="420" y1="142" x2="420" y2="162" stroke="#FFD54F" stroke-width="10" stroke-linecap="round"/>
  <line x1="368" y1="90" x2="348" y2="90" stroke="#FFD54F" stroke-width="10" stroke-linecap="round"/>
  <line x1="472" y1="90" x2="492" y2="90" stroke="#FFD54F" stroke-width="10" stroke-linecap="round"/>
  <line x1="383" y1="53" x2="369" y2="39" stroke="#FFD54F" stroke-width="10" stroke-linecap="round"/>
  <line x1="457" y1="127" x2="471" y2="141" stroke="#FFD54F" stroke-width="10" stroke-linecap="round"/>
  <line x1="383" y1="127" x2="369" y2="141" stroke="#FFD54F" stroke-width="10" stroke-linecap="round"/>
  <line x1="457" y1="53" x2="471" y2="39" stroke="#FFD54F" stroke-width="10" stroke-linecap="round"/>
  <!-- Battery -->
  <rect x="160" y="400" width="192" height="80" rx="10" fill="#4DD0E1" stroke="#1A2744" stroke-width="12"/>
  <rect x="230" y="388" width="52" height="16" rx="4" fill="#1A2744"/>
  <!-- Battery level bars -->
  <rect x="182" y="418" width="28" height="44" rx="4" fill="#1A2744"/>
  <rect x="220" y="418" width="28" height="44" rx="4" fill="#1A2744"/>
  <rect x="258" y="418" width="28" height="44" rx="4" fill="#1A2744"/>
  <rect x="296" y="418" width="28" height="44" rx="4" fill="#80E8F0" stroke="#1A2744" stroke-width="4"/>
  <!-- Lightning bolt connecting panel to battery -->
  <polyline points="240,370 250,388 244,388 254,400" fill="none" stroke="#FFD54F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
