<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Panel body -->
  <rect x="120" y="80" width="272" height="360" rx="14" fill="#5C6D8E" stroke="#1A2744" stroke-width="16" stroke-linejoin="round"/>
  <!-- Inner panel area -->
  <rect x="150" y="110" width="212" height="300" rx="8" fill="#7B8DAB" stroke="#1A2744" stroke-width="8"/>
  <!-- Heavy duty bolts - corners -->
  <circle cx="148" cy="108" r="12" fill="#A0AAB8" stroke="#1A2744" stroke-width="6"/>
  <circle cx="364" cy="108" r="12" fill="#A0AAB8" stroke="#1A2744" stroke-width="6"/>
  <circle cx="148" cy="412" r="12" fill="#A0AAB8" stroke="#1A2744" stroke-width="6"/>
  <circle cx="364" cy="412" r="12" fill="#A0AAB8" stroke="#1A2744" stroke-width="6"/>
  <!-- Bolt cross marks -->
  <line x1="142" y1="108" x2="154" y2="108" stroke="#1A2744" stroke-width="3"/>
  <line x1="148" y1="102" x2="148" y2="114" stroke="#1A2744" stroke-width="3"/>
  <line x1="358" y1="108" x2="370" y2="108" stroke="#1A2744" stroke-width="3"/>
  <line x1="364" y1="102" x2="364" y2="114" stroke="#1A2744" stroke-width="3"/>
  <line x1="142" y1="412" x2="154" y2="412" stroke="#1A2744" stroke-width="3"/>
  <line x1="148" y1="406" x2="148" y2="418" stroke="#1A2744" stroke-width="3"/>
  <line x1="358" y1="412" x2="370" y2="412" stroke="#1A2744" stroke-width="3"/>
  <line x1="364" y1="406" x2="364" y2="418" stroke="#1A2744" stroke-width="3"/>
  <!-- Breaker switches -->
  <rect x="180" y="140" width="60" height="80" rx="6" fill="#4DD0E1" stroke="#1A2744" stroke-width="8"/>
  <rect x="272" y="140" width="60" height="80" rx="6" fill="#4DD0E1" stroke="#1A2744" stroke-width="8"/>
  <!-- Switch toggles -->
  <rect x="198" y="150" width="24" height="30" rx="4" fill="#1A2744"/>
  <rect x="290" y="150" width="24" height="30" rx="4" fill="#1A2744"/>
  <!-- Indicator lights -->
  <circle cx="210" cy="245" r="12" fill="#69F0AE" stroke="#1A2744" stroke-width="6"/>
  <circle cx="256" cy="245" r="12" fill="#FFD54F" stroke="#1A2744" stroke-width="6"/>
  <circle cx="302" cy="245" r="12" fill="#FF5252" stroke="#1A2744" stroke-width="6"/>
  <!-- Ex-proof symbol / hazard warning -->
  <!-- Triangle -->
  <polygon points="256,285 220,345 292,345" fill="#FFD54F" stroke="#1A2744" stroke-width="8" stroke-linejoin="round"/>
  <!-- Explosion symbol inside triangle -->
  <text x="256" y="338" font-family="Arial" font-weight="bold" font-size="36" fill="#1A2744" text-anchor="middle">Ex</text>
  <!-- Cable glands at bottom -->
  <rect x="180" y="415" width="24" height="30" rx="4" fill="#A0AAB8" stroke="#1A2744" stroke-width="6"/>
  <rect x="244" y="415" width="24" height="30" rx="4" fill="#A0AAB8" stroke="#1A2744" stroke-width="6"/>
  <rect x="308" y="415" width="24" height="30" rx="4" fill="#A0AAB8" stroke="#1A2744" stroke-width="6"/>
</svg>
